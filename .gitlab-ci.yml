stages:
  - build
  - test

build_pdfcpu:
  image: debian:12-slim
  stage: build
  variables:
    GO_VERSION: "1.26.1"
  script:
    - apt update
    - apt install -y wget git
    - cd /
    - wget "https://go.dev/dl/go${GO_VERSION}.linux-amd64.tar.gz"
    - tar xzf "go${GO_VERSION}.linux-amd64.tar.gz"
    - git clone https://github.com/pdfcpu/pdfcpu /root/pdfcpu
    # Build v0.11.1 (legacy CLI with single-dash long flags)
    - cd /root/pdfcpu && git checkout v0.11.1
    - cd cmd/pdfcpu && /go/bin/go build -o "$CI_PROJECT_DIR/pdfcpu_0.11.1"
    - '"$CI_PROJECT_DIR/pdfcpu_0.11.1" version'
    # Build v0.12.1 (Cobra-based CLI with POSIX-style long flags)
    - cd /root/pdfcpu && git checkout v0.12.1
    - cd cmd/pdfcpu && /go/bin/go build -o "$CI_PROJECT_DIR/pdfcpu_0.12.1"
    - '"$CI_PROJECT_DIR/pdfcpu_0.12.1" version'
    # Build current master (drives the version-agnostic high-level tests)
    - cd /root/pdfcpu && git checkout master
    - cd cmd/pdfcpu && /go/bin/go build -o "$CI_PROJECT_DIR/pdfcpu"
    - '"$CI_PROJECT_DIR/pdfcpu" version'
  artifacts:
    paths:
      - $CI_PROJECT_DIR/pdfcpu
      - $CI_PROJECT_DIR/pdfcpu_0.11.1
      - $CI_PROJECT_DIR/pdfcpu_0.12.1
  tags:
      - shared

.test_template:
  stage: test
  cache:
    untracked: false
    paths:
      - $COMPOSER_HOME/cache
  artifacts:
    expire_in: 1 hour
    name: "$CI_PROJECT_PATH_SLUG-$CI_PIPELINE_ID"
    paths:
      - build/coverage
      - build/doc
  variables:
    COMPOSER_HOME: "$CI_PROJECT_DIR/build/.composer"
  script:
    - cp $CI_PROJECT_DIR/pdfcpu /usr/bin/pdfcpu
    - cp $CI_PROJECT_DIR/pdfcpu_0.11.1 /usr/local/bin/pdfcpu_0.11.1
    - cp $CI_PROJECT_DIR/pdfcpu_0.12.1 /usr/local/bin/pdfcpu_0.12.1
    - apk add --no-cache --update pdftk
    - php-ext.sh enable 'xdebug'
    - composer install --no-progress
    - phpcs $CI_PROJECT_DIR/src $CI_PROJECT_DIR/tests --standard=PSR2
    - php vendor/bin/phpunit $CI_PROJECT_DIR/tests --coverage-text -vv --colors=never
    - sami update sami.php
  coverage: '/^\s*Lines:\s*\d+.\d+\%/'
  tags:
    - shared

test_php71:
    extends: .test_template
    image: $CI_REGISTRY/docker/alpine37-php71:v2

test_php72:
    extends: .test_template
    image: $CI_REGISTRY/docker/alpine38-php72:v1
